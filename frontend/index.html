<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskCampus</title>
  </head>
  <body class="bg-stone-50 text-stone-800 font-sans min-h-screen p-8">
    <div class="max-w-5xl mx-auto space-y-8">
      
      <header class="border-b border-stone-200 pb-4">
        <h1 class="text-3xl font-light tracking-tight">TaskCampus</h1>
        <p class="text-stone-500 text-sm mt-1">Gestión académica minimalista</p>
      </header>

      <section id="summary-panel" class="grid grid-cols-2 md:grid-cols-4 gap-4">
        </section>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <aside class="md:col-span-1 bg-white p-6 rounded-lg shadow-sm border border-stone-100">
          <h2 class="text-lg font-medium mb-4">Nueva Tarea</h2>
          <form id="task-form" class="space-y-4">
            <div>
              <label class="block text-xs text-stone-500 mb-1">Título</label>
              <input type="text" id="titulo" required class="w-full border border-stone-200 rounded p-2 text-sm focus:outline-none focus:border-stone-400">
            </div>
            <div>
              <label class="block text-xs text-stone-500 mb-1">Descripción</label>
              <textarea id="descripcion" required class="w-full border border-stone-200 rounded p-2 text-sm focus:outline-none focus:border-stone-400"></textarea>
            </div>
            <div>
              <label class="block text-xs text-stone-500 mb-1">Asignatura</label>
              <input type="text" id="asignatura" required class="w-full border border-stone-200 rounded p-2 text-sm focus:outline-none focus:border-stone-400">
            </div>
            <div>
              <label class="block text-xs text-stone-500 mb-1">Fecha de Entrega</label>
              <input type="date" id="fecha_entrega" required class="w-full border border-stone-200 rounded p-2 text-sm focus:outline-none focus:border-stone-400">
            </div>
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="block text-xs text-stone-500 mb-1">Prioridad</label>
                <select id="prioridad" class="w-full border border-stone-200 rounded p-2 text-sm bg-white focus:outline-none focus:border-stone-400">
                  <option value="baja">Baja</option>
                  <option value="media">Media</option>
                  <option value="alta">Alta</option>
                </select>
              </div>
              <div>
                <label class="block text-xs text-stone-500 mb-1">Estado</label>
                <select id="estado" class="w-full border border-stone-200 rounded p-2 text-sm bg-white focus:outline-none focus:border-stone-400">
                  <option value="pendiente">Pendiente</option>
                  <option value="en proceso">En proceso</option>
                  <option value="finalizada">Finalizada</option>
                </select>
              </div>
            </div>
            <div class="flex space-x-2">
              <button type="submit" id="submit-btn" class="w-full bg-stone-800 text-white rounded p-2 text-sm hover:bg-stone-700 transition duration-200">Registrar Tarea</button>
              <button type="button" id="cancel-btn" class="hidden w-full bg-stone-100 text-stone-600 border border-stone-200 rounded p-2 text-sm hover:bg-stone-200 transition duration-200">Cancelar</button>
            </div>          </form>
        </aside>

        <main class="md:col-span-2 space-y-4">
          <div class="flex justify-between items-center bg-white p-3 rounded-lg shadow-sm border border-stone-100">
            <span class="text-sm font-medium text-stone-600">Filtros:</span>
            <div class="flex space-x-2">
              <select id="filter-estado" class="text-sm border border-stone-200 rounded p-1 bg-white focus:outline-none">
                <option value="">Todos los estados</option>
                <option value="pendiente">Pendiente</option>
                <option value="en proceso">En proceso</option>
                <option value="finalizada">Finalizada</option>
              </select>
            </div>
          </div>
          
          <div id="tasks-container" class="space-y-3">
            </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
